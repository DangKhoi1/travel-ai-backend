version: '3.8'

services:
  postgres:
    image: ankane/pgvector
    container_name: travel_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: travel_ai
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: travel_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
